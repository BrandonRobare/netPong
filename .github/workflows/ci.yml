name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the source
        uses: actions/checkout@v4

      - name: Install ncurses
        run: |
          sudo apt-get update
          sudo apt-get install -y libncurses-dev

      - name: Build the networked binary
        run: make

      - name: Confirm the binary exists
        run: test -x ./pong
